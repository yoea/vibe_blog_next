name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Gitea Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(sed -n "/^### \[${VERSION}\]/,/^### \[/p" CHANGELOG.md | sed '1d' | sed '$ { /^### \[/d; }')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release via API
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${{ gitea.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -d "$(jq -n \
              --arg tag "${GITHUB_REF_NAME}" \
              --arg name "v${GITHUB_REF_NAME}" \
              --arg body "${{ steps.notes.outputs.notes }}" \
              '{tag_name: $tag, name: $name, body: $body}'
            )"
