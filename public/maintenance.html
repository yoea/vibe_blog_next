<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字里行间 - 系统维护中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --background: #ffffff;
    --foreground: #0f172a;
    --card: #ffffff;
    --card-border: #e2e8f0;
    --muted: #f8fafc;
    --muted-foreground: #64748b;
    --primary: #6366f1;
    --primary-light: #818cf8;
    --accent: #eef2ff;
    --radius: 0.625rem;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
    color-scheme: light dark;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background: #0f172a;
      --foreground: #f1f5f9;
      --card: #1e293b;
      --card-border: #334155;
      --muted: #1e293b;
      --muted-foreground: #94a3b8;
      --primary: #818cf8;
      --primary-light: #a5b4fc;
      --accent: #1e1b4b;
    }
  }

  body {
    font-family: var(--font-sans);
    background: linear-gradient(160deg, var(--background) 0%, var(--accent) 50%, var(--background) 100%);
    color: var(--foreground);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--card-border);
    background: var(--background);
  }
  .header-inner {
    max-width: 56rem;
    margin: 0 auto;
    padding: 0 1rem;
    height: 3.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .logo {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .site-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .card-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 1.25rem;
    border-radius: 1rem;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  }
  .card-icon svg {
    width: 28px;
    height: 28px;
  }
  .card h1 {
    font-size: 1.125rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }
  .card p {
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--muted-foreground);
    margin-bottom: 0.375rem;
  }

  /* Status badge */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding: 0.375rem 1rem;
    border-radius: 999px;
    font-size: 0.8125rem;
    background: var(--accent);
    color: var(--primary);
    font-weight: 500;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--primary-light);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  /* Timer */
  .timer {
    margin-top: 1rem;
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    color: var(--muted-foreground);
    letter-spacing: 0.05em;
  }
  .timer-label {
    font-family: var(--font-sans);
    font-size: 0.75rem;
    color: var(--muted-foreground);
    opacity: 0.7;
    margin-bottom: 0.25rem;
  }

  /* Progress bar */
  .progress {
    margin-top: 1.5rem;
    height: 3px;
    background: var(--muted);
    border-radius: 999px;
    overflow: hidden;
    max-width: 200px;
    margin-left: auto;
    margin-right: auto;
  }
  .progress-bar {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    border-radius: 999px;
    animation: progress 2s ease-in-out infinite;
  }
  @keyframes progress {
    0% { transform: translateX(-100%); width: 30%; }
    50% { width: 60%; }
    100% { transform: translateX(300%); width: 30%; }
  }

  /* Footer */
  .footer {
    border-top: 1px solid var(--card-border);
    background: var(--background);
    padding: 0.75rem 1rem;
    text-align: center;
    font-size: 0.6875rem;
    color: var(--muted-foreground);
  }
  .footer-inner {
    max-width: 56rem;
    margin: 0 auto;
  }
</style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <circle cx="16" cy="16" r="14" fill="url(#logo-grad)"/>
        <path d="M10 22 L14 10 L16 8 L18 10 L22 22 Z" fill="white" opacity="0.95"/>
        <path d="M14 14 L16 12 L18 14 L18 16 L16 22 L14 16 Z" fill="#6366f1" opacity="0.3"/>
      </svg>
      <span class="site-title">字里行间</span>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>正在升级新版本</h1>
      <p>站点正在进行短时维护，以带来更好的体验。</p>
      <p>请稍后再来访问，预计很快完成。</p>

      <div class="status">
        <span class="status-dot"></span>
        <span id="statusText">部署进行中</span>
      </div>

      <div class="progress">
        <div class="progress-bar"></div>
      </div>

      <div class="timer">
        <div class="timer-label">已等待</div>
        <div id="timerDisplay">00:00</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      Copyright &copy; 2026 <strong>Yoea</strong>. All rights reserved.
    </div>
  </footer>

  <script>
    const statusText = document.getElementById('statusText')
    const timerDisplay = document.getElementById('timerDisplay')
    // 部署开始时间由服务端注入，中途进入的用户也能看到已过去的时长
    const startTime = __DEPLOY_START_MS__

    // 计时器
    var timerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - startTime) / 1000)
      var min = String(Math.floor(elapsed / 60)).padStart(2, '0')
      var sec = String(elapsed % 60).padStart(2, '0')
      timerDisplay.textContent = min + ':' + sec
    }, 1000)

    // 轮询主站
    async function check() {
      try {
        const res = await fetch('/', { cache: 'no-store' })
        if (res.ok) {
          clearInterval(timerInterval)
          const duration = Math.round((Date.now() - startTime) / 1000)
          localStorage.setItem('deploy_info', JSON.stringify({
            duration: duration,
            timestamp: Date.now()
          }))
          statusText.textContent = '部署完成，正在跳转...'
          setTimeout(function() { location.reload() }, 1000)
          return
        }
      } catch {}
      setTimeout(check, 2000)
    }

    check()
  </script>
</body>
</html>
