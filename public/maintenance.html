<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统维护中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8fafc;
    color: #1e293b;
  }
  @media (prefers-color-scheme: dark) {
    body {
      background: #0f172a;
      color: #e2e8f0;
    }
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
  }
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.5rem;
    border-radius: 16px;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg {
    width: 32px;
    height: 32px;
    fill: white;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.938rem;
    line-height: 1.6;
    color: #64748b;
    margin-bottom: 0.5rem;
  }
  @media (prefers-color-scheme: dark) {
    p { color: #94a3b8; }
  }
  .status {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-size: 0.813rem;
    background: #f1f5f9;
    color: #475569;
  }
  @media (prefers-color-scheme: dark) {
    .status { background: #1e293b; color: #94a3b8; }
  }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 6px;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #94a3b8;
  }
</style>
</head>
<body>
<div class="container">
  <div class="icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
  </div>
  <h1>正在升级新版本</h1>
  <p>站点正在进行短时维护，以带来更好的体验。</p>
  <p>请稍后再来访问，预计很快完成。</p>
  <div class="status">
    <span class="status-dot"></span>
    部署进行中
  </div>
  <footer>自动刷新页面即可</footer>
</div>
</body>
</html>
