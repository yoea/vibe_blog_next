name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    if: github.repository == 'yoea/vibe_blog_next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(sed -nE "/^#{2,3} \[${VERSION}\]/,/^#{2,3} \[/p" CHANGELOG.md | sed '1d' | sed '$ { /^#{2,3} \[/d; }')
          # Replace Gitee compare/commit URLs with GitHub for the release notes
          NOTES=$(echo "$NOTES" | sed 's|git\.ewing\.top/yoea/vibe_blog_next|github.com/yoea/vibe_blog_next|g')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "${{ steps.notes.outputs.notes }}"
